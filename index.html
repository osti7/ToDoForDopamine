<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do For Dopamine</title>
  <script>
    (function () {
      try {
        var saved = JSON.parse(localStorage.getItem('todoForDopamine') || '{}');
        if (saved.colorTheme) {
          document.documentElement.setAttribute('data-color', saved.colorTheme);
        }
      } catch (error) {}
    })();
  </script>
  <!-- Görseli sen seçeceksin: dosyayı assets/favicon.png olarak kaydet -->
  <link rel="icon" type="image/png" href="logo v2.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="progress-box">
    <div class="progress-header">
      <p class="progress-title">To-Do Wıth Progress Bar</p>

      <div class="theme-picker">
        <button
          type="button"
          class="theme-picker__trigger"
          aria-haspopup="true"
          aria-expanded="false"
          aria-label="Choose color theme"
        >
          Color
        </button>
        <div class="theme-picker__menu" hidden>
          <p class="theme-picker__title">Color</p>
          <div class="theme-picker__options"></div>
        </div>
      </div>
    </div>

    <div class="task-section">
      <form class="task-add" autocomplete="off">
        <input
          type="text"
          class="task-add__input"
          placeholder="New task..."
          maxlength="120"
          aria-label="New task"
        >
        <button type="submit" class="task-add__btn" aria-label="Add task">+</button>
      </form>

      <ul class="task-list" aria-live="polite"></ul>

      <p class="task-meta">
        <span class="task-meta-counter">0 / 0 completed</span>
        ·
        <span class="task-meta-step">Add a task to start</span>
      </p>
    </div>

    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>
    <span class="progress-label">0%</span>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
